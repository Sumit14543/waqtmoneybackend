services:
  - type: web
    name: waqtmoney-api
    runtime: node
    rootDir: Server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_BASE_URL
        value: https://waqtmoney.com
      - key: API_PUBLIC_BASE_URL
        value: https://waqtmoney-api.onrender.com
      - key: CORS_ORIGINS
        value: https://waqtmoney.com,https://www.waqtmoney.com
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: CRM_API_KEY
        sync: false
      - key: BIFROST_API_TOKEN
        sync: false
      - key: BIFROST_REACT_API_TOKEN
        sync: false
      - key: CASHFREE_ENV
        value: production
      - key: CASHFREE_CLIENT_ID
        sync: false
      - key: CASHFREE_CLIENT_SECRET
        sync: false
      - key: CASHFREE_ALLOWED_ORIGIN
        value: https://waqtmoney.com
      - key: CASHFREE_RETURN_URL
        value: https://waqtmoney.com/repayment/make-payment?order_id={order_id}&application_id={application_id}
      - key: CASHFREE_NOTIFY_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
