name: Deploy Backend to cPanel 

on:
  push:
    branches:
      - main

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Test SSH Connection
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 "echo Connected Successfully"

      - name: Deploy Backend Files
        run: |
          rsync -avz --delete \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=.env \
          --exclude=.env.* \
          --exclude=cache \
          --exclude=uploads \
          --exclude=app.log \
          --exclude=.well-known \
          -e "ssh -p 5726 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./ \
          waqtmoney@103.234.185.16:/home/waqtmoney/public_html/waqt-testing-api/

      - name: Restore Remote Env From Secret
        env:
          CPANEL_ENV_B64: ${{ secrets.CPANEL_ENV_B64 }}
        run: |
          if [ -z "$CPANEL_ENV_B64" ]; then
            echo "CPANEL_ENV_B64 secret is not configured; expecting remote .env to already exist."
            exit 0
          fi

          printf '%s' "$CPANEL_ENV_B64" | ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 \
          "cd /home/waqtmoney/public_html/waqt-testing-api/ && base64 -d > .env && chmod 600 .env"

      - name: Verify Remote Env
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 \
          "test -s /home/waqtmoney/public_html/waqt-testing-api/.env"

      - name: Install Dependencies
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 "
            set -e
            cd /home/waqtmoney/public_html/waqt-testing-api/
            npm install
          "

      - name: Restart cPanel Passenger App
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 "
            set -e
            cd /home/waqtmoney/public_html/waqt-testing-api/
            mkdir -p tmp
            touch tmp/restart.txt
          "

      - name: Stop Running Backend
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 "
            cd /home/waqtmoney/public_html/waqt-testing-api/
            if [ -f app.pid ]; then kill \$(cat app.pid) 2>/dev/null || true; rm -f app.pid; fi
            if command -v lsof >/dev/null 2>&1; then lsof -ti:\${PORT:-5000} | xargs -r kill 2>/dev/null || true; fi
            if command -v fuser >/dev/null 2>&1; then fuser -k \${PORT:-5000}/tcp 2>/dev/null || true; fi
            if command -v pgrep >/dev/null 2>&1; then pgrep -f '[n]ode .*waqt-testing-api' | xargs -r kill 2>/dev/null || true; fi
            if command -v pgrep >/dev/null 2>&1; then pgrep -f '[n]ode .*Server.js' | xargs -r kill 2>/dev/null || true; fi
            if command -v pgrep >/dev/null 2>&1; then pgrep -f '[n]ode .*server.js' | xargs -r kill 2>/dev/null || true; fi
          "

      - name: Start Backend
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 "
            set -e
            cd /home/waqtmoney/public_html/waqt-testing-api/
            nohup env NODE_ENV=production APP_ENV=production node Server.js > app.log 2>&1 < /dev/null &
            echo \$! > app.pid
          "

      - name: Verify Remote Health
        run: |
          ssh -p 5726 \
          -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          waqtmoney@103.234.185.16 "
            set -e
            cd /home/waqtmoney/public_html/waqt-testing-api/
            sleep 8
            if ! kill -0 \$(cat app.pid) 2>/dev/null; then tail -100 app.log; exit 1; fi
            curl -fsS http://127.0.0.1:\${PORT:-5000}/api/health
          "

      - name: Verify Public API
        run: |
          allowed_headers=$(curl -fsSI https://waqt-testing-api.waqtmoney.com/api/health | tr -d '\r' | grep -i '^Access-Control-Allow-Headers:' || true)
          echo "$allowed_headers"
          if ! echo "$allowed_headers" | grep -qi 'X-Application-Id'; then
            echo "::warning::Public API is still serving the legacy CORS header. Check the cPanel Node app root/proxy mapping for waqt-testing-api.waqtmoney.com."
          fi

          status_code=$(curl -sS -o /tmp/recover-session-response.txt -w "%{http_code}" \
            -X POST https://waqt-testing-api.waqtmoney.com/api/application/recover-session \
            -H 'Content-Type: application/json' \
            --data '{"applicationId":"deployment-smoke-test"}')
          cat /tmp/recover-session-response.txt
          if [ "$status_code" = "404" ]; then
            echo "::warning::Public recover-session endpoint is still 404. Frontend upload flow is compatible with the legacy backend while cPanel mapping is corrected."
          fi
